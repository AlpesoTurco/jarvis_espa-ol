<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jarvis Voz</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #111418;
            --panel: #1b2027;
            --panel-2: #252b34;
            --text: #f4f7fb;
            --muted: #9ca8b7;
            --accent: #36d399;
            --accent-2: #59a6ff;
            --danger: #ff6b6b;
            --border: #343c48;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        main {
            width: min(720px, 100%);
            min-height: 100vh;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding-bottom: 4px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .status {
            min-width: 108px;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            color: var(--muted);
            font-size: 13px;
            text-align: center;
        }

        .conversation {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding: 2px 0;
        }

        .bubble {
            max-width: 88%;
            padding: 12px 14px;
            border-radius: 8px;
            line-height: 1.45;
            overflow-wrap: anywhere;
            border: 1px solid var(--border);
        }

        .user {
            align-self: flex-end;
            background: #173b32;
            border-color: #236750;
        }

        .assistant {
            align-self: flex-start;
            background: var(--panel);
        }

        .composer {
            display: grid;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
        }

        textarea {
            width: 100%;
            min-height: 80px;
            resize: vertical;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--text);
            font: inherit;
            line-height: 1.4;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        button {
            min-height: 48px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--text);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #08110d;
        }

        button.secondary {
            background: var(--accent-2);
            border-color: var(--accent-2);
            color: #07111f;
        }

        button.danger {
            color: var(--danger);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .hint {
            min-height: 18px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.35;
        }

        @media (max-width: 520px) {
            main {
                padding: 14px;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .bubble {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>Jarvis Voz</h1>
            <div id="status" class="status">Listo</div>
        </header>

        <section id="conversation" class="conversation" aria-live="polite"></section>

        <section class="composer">
            <textarea id="prompt" placeholder="Toca Hablar o escribe un comando"></textarea>
            <div class="controls">
                <button id="listenButton" class="primary" type="button">Hablar</button>
                <button id="sendButton" class="secondary" type="button">Enviar</button>
                <button id="stopButton" class="danger" type="button">Silencio</button>
            </div>
            <div id="hint" class="hint"></div>
        </section>
    </main>

    <script>
        const promptInput = document.getElementById('prompt');
        const conversation = document.getElementById('conversation');
        const statusLabel = document.getElementById('status');
        const hint = document.getElementById('hint');
        const listenButton = document.getElementById('listenButton');
        const sendButton = document.getElementById('sendButton');
        const stopButton = document.getElementById('stopButton');
        const isLocalhost = ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname);
        const isSecureEnough = window.isSecureContext || isLocalhost;

        let mediaRecorder = null;
        let audioChunks = [];
        let recording = false;
        let recordingTimeout = null;

        function setStatus(text) {
            statusLabel.textContent = text;
        }

        function addBubble(role, text) {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${role}`;
            bubble.textContent = text;
            conversation.appendChild(bubble);
            conversation.scrollTop = conversation.scrollHeight;
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) {
                hint.textContent = 'Tu navegador no tiene salida de voz.';
                return;
            }

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-MX';
            utterance.rate = 1;
            utterance.pitch = 1;
            window.speechSynthesis.speak(utterance);
        }

        async function sendMessage() {
            const message = promptInput.value.trim();

            if (!message) {
                promptInput.focus();
                return;
            }

            addBubble('user', message);
            promptInput.value = '';
            setStatus('Pensando');
            sendButton.disabled = true;
            listenButton.disabled = true;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();

                if (!response.ok || !data.ok) {
                    throw new Error(data.error || data.message || 'No pude completar la solicitud.');
                }

                const answer = data.message || data.response || 'Listo.';
                addBubble('assistant', answer);
                speak(answer);
                setStatus('Listo');
            } catch (error) {
                const message = error.message || 'Error al hablar con Jarvis.';
                addBubble('assistant', message);
                speak(message);
                setStatus('Error');
            } finally {
                sendButton.disabled = false;
                listenButton.disabled = false;
            }
        }

        function getSupportedAudioType() {
            const types = [
                'audio/webm;codecs=opus',
                'audio/webm',
                'audio/mp4',
                'audio/ogg;codecs=opus'
            ];

            return types.find(type => window.MediaRecorder?.isTypeSupported(type)) || '';
        }

        async function uploadAudio(blob) {
            setStatus('Transcribiendo');
            listenButton.disabled = true;
            sendButton.disabled = true;

            try {
                const response = await fetch('/api/transcribe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': blob.type || 'application/octet-stream'
                    },
                    body: blob
                });
                const data = await response.json();

                if (!response.ok || !data.ok) {
                    throw new Error(data.error || 'No pude transcribir el audio.');
                }

                promptInput.value = data.text;
                await sendMessage();
            } catch (error) {
                const message = error.message || 'No pude transcribir el audio.';
                addBubble('assistant', message);
                speak(message);
                setStatus('Error');
            } finally {
                listenButton.disabled = false;
                sendButton.disabled = false;
            }
        }

        function stopRecording() {
            if (!recording || !mediaRecorder) {
                return;
            }

            clearTimeout(recordingTimeout);
            recording = false;
            listenButton.textContent = 'Hablar';
            mediaRecorder.stop();
        }

        async function startRecording() {
            if (!isSecureEnough) {
                const httpsUrl = `https://${window.location.hostname}:3443/voice`;
                hint.textContent = `El microfono requiere HTTPS. Abre ${httpsUrl}`;
                return;
            }

            if (!navigator.mediaDevices?.getUserMedia || !window.MediaRecorder) {
                hint.textContent = 'Este navegador no soporta grabacion de audio. Puedes escribir el comando.';
                return;
            }

            if (recording) {
                stopRecording();
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = getSupportedAudioType();

                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };
                mediaRecorder.onstop = () => {
                    stream.getTracks().forEach(track => track.stop());
                    const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });

                    if (!blob.size) {
                        setStatus('Error');
                        hint.textContent = 'No recibi audio. Intenta hablar mas cerca del microfono.';
                        return;
                    }

                    uploadAudio(blob);
                };
                mediaRecorder.start();
                recording = true;
                listenButton.textContent = 'Detener';
                setStatus('Grabando');
                hint.textContent = 'Toca Detener cuando termines de hablar.';
                window.speechSynthesis?.cancel();
                recordingTimeout = setTimeout(stopRecording, 12000);
            } catch (error) {
                setStatus('Error');
                hint.textContent = `No pude usar el microfono: ${error.message || error.name}.`;
            }
        }

        if (!isSecureEnough) {
            hint.textContent = 'El microfono requiere HTTPS en celular. Usa la direccion https:// de Jarvis.';
        }

        listenButton.addEventListener('click', startRecording);
        sendButton.addEventListener('click', sendMessage);
        stopButton.addEventListener('click', () => {
            stopRecording();
            window.speechSynthesis?.cancel();
        });
        promptInput.addEventListener('keydown', event => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
